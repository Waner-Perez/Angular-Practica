<h1>{{ name() }}</h1>

<dl>
  <td class="fw-bold">Nombre:</td>
  <dd>{{ name() }}</dd>

  <td class="fw-bold">Edad:</td>
  <dd>{{ age() }}</dd>

  <td class="fw-bold">Método:</td>
  <dd>{{ heroDescription() }}</dd>

  <td class="fw-bold">Capitalizado:</td>
  <!-- ! Intentar  -->
  <!-- <dd> {{ capitalizedName() }} </dd> -->
  <dd> {{ name() | uppercase }} </dd>
</dl>

<button (click)="changeHero()" class="btn btn-primary mx-2">
  Cambiar nombre
</button>

<button (click)="changeEdad()" class="btn btn-primary">Cambiar edad</button>

<button (click)="resetForm()" class="btn btn-primary mx-2">Reset</button>
